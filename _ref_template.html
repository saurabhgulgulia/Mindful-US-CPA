:root {
  /* ---------------- Brand palette ---------------- */
  --brand-navy:        #0E2240;   /* Primary — deep ink navy, gravitas       */
  --brand-navy-2:      #19345B;   /* Darker hover / 2nd surface              */
  --brand-navy-soft:   #2B4773;   /* Soft navy for secondary text            */

  --brand-gold:        #C9A24A;   /* Refined gold (from logo blob)           */
  --brand-gold-deep:   #A8842F;   /* Pressed / hover state                   */
  --brand-gold-soft:   #E8D49A;   /* Soft tint / chip background             */

  --brand-aubergine:   #4B4A78;   /* Dusty indigo (from wordmark)            */
  --brand-aubergine-2: #6B6A9A;   /* Lighter aubergine                       */

  --brand-sage:        #6B8073;   /* Muted sage accent — "mindful" hint      */
  --brand-sage-soft:   #DCE3DD;

  /* ---------------- Neutrals (warm) ---------------- */
  --cream:             #FAF6EE;   /* Page background — warm off-white        */
  --cream-2:           #F4EFE4;   /* Alt background / hover surface          */
  --paper:             #FFFFFF;   /* Card / elevated surface                 */
  --ink:               #16213A;   /* Body text                               */
  --ink-2:             #4A5570;   /* Secondary text                          */
  --ink-3:             #7A8294;   /* Tertiary / muted                        */
  --rule:              #D9D2C2;   /* Hairline divider (warm)                 */
  --rule-soft:         #ECE6D8;   /* Soft divider                            */

  /* ---------------- Semantic ---------------- */
  --success:           #3F7A52;
  --warning:           #B97A1A;
  --danger:            #A8362E;
  --info:              #2A5A8C;

  /* ---------------- Typography scale ---------------- */
  --font-display:  'Cormorant Garamond', 'Source Serif Pro', Georgia, serif;
  --font-body:     'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:     'JetBrains Mono', 'SF Mono', Menlo, monospace;

  --fs-display:   72px;   --lh-display: 1.05;   --tr-display: -0.02em;
  --fs-h1:        56px;   --lh-h1:      1.10;   --tr-h1:      -0.015em;
  --fs-h2:        40px;   --lh-h2:      1.15;   --tr-h2:      -0.01em;
  --fs-h3:        28px;   --lh-h3:      1.25;   --tr-h3:      -0.005em;
  --fs-h4:        22px;   --lh-h4:      1.30;
  --fs-lead:      20px;   --lh-lead:    1.55;
  --fs-body:      17px;   --lh-body:    1.65;
  --fs-small:     15px;   --lh-small:   1.55;
  --fs-caption:   13px;   --lh-caption: 1.45;
  --fs-eyebrow:   12px;   --lh-eyebrow: 1.20;

  /* ---------------- Spacing ---------------- */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;

.cta-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 20px;
  padding: var(--space-8) var(--space-9);
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: var(--space-7);
  align-items: center;
  position: relative;
  overflow: hidden;
}
.cta-card::before {
  content: "";
  position: absolute;
  top: -80px;
  right: -80px;
  width: 280px;
  height: 280px;
  background: var(--brand-gold-soft);
  border-radius: 50% 42% 50% 45% / 45% 50% 42% 50%;
  opacity: 0.5;
  pointer-events: none;
}
.cta-card > * { position: relative; }

/* ============================================================
   Intake Portal (multi-step form)
   ============================================================ */
.intake-portal {
  padding: var(--space-9) 0;
  background: var(--cream-2);
}

.intake-steps {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-6);
  margin-bottom: var(--space-7);
  flex-wrap: wrap;
}
.intake-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
}
.intake-step-line {
  position: absolute;
  top: 18px;
  left: calc(100% + 12px);
  width: var(--space-6);
  height: 1px;
  background: var(--rule);
}
.intake-step.done .intake-step-line { background: var(--brand-gold); }
.intake-step-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--cream);
  border: 1.5px solid var(--rule);
  color: var(--ink-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 14px;
  transition: all var(--dur) var(--ease);
}
.intake-step.active .intake-step-dot {
  background: var(--brand-navy);
  border-color: var(--brand-navy);
  color: var(--paper);
  box-shadow: 0 0 0 4px rgba(201,162,74,0.18);
}
.intake-step.done .intake-step-dot {
  background: var(--brand-gold);
  border-color: var(--brand-gold);
  color: var(--brand-navy);
}
.intake-step-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.intake-step.active .intake-step-label {
  color: var(--brand-navy);
  font-weight: 600;
}
.intake-step.done .intake-step-label { color: var(--brand-gold-deep); }

.intake-card {
  background: var(--paper);
  border: 1px solid var(--rule-soft);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 12px 32px rgba(14,34,64,.07);
}
.intake-progress {
  height: 4px;
  background: var(--cream-2);
}
.intake-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brand-gold), var(--brand-gold-deep));
  transition: width var(--dur-slow) var(--ease);
}
.intake-card-header {
  background: var(--brand-navy);
  color: var(--paper);
  padding: var(--space-5) var(--space-7);
  display: flex;
  align-items: center;
  gap: var(--space-4);
}
.intake-step-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--brand-gold);
  color: var(--brand-navy);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.intake-card-header h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  color: var(--paper);
  margin: 0;
  line-height: 1.2;
}
.intake-card-header p {
  font-size: 13px;
  color: rgba(255,255,255,0.66);
  margin: 2px 0 0;
}

.intake-body { padding: var(--space-6) var(--space-7); }
.intake-body .form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}
.intake-body .form-row.full { grid-template-columns: 1fr; }
.intake-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.intake-field-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--brand-navy);
  letter-spacing: 0;
}
.intake-field-required {
  color: var(--brand-gold-deep);
  margin-left: 3px;
}
.intake-field-hint {
  font-size: 12px;
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.intake-field .field-input,
.intake-field .field-select,
.intake-field .field-textarea {
  font-family: var(--font-body);
  font-size: 15px;
  padding: 11px 14px;
  border: 1.5px solid var(--rule);
  border-radius: 9px;
  background: var(--cream);
  color: var(--ink);
  outline: none;
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
  width: 100%;
}
.intake-field .field-input:focus,
.intake-field .field-select:focus,
.intake-field .field-textarea:focus {
  border-color: var(--brand-gold);
  background: var(--paper);
}
.intake-field .field-textarea { resize: vertical; min-height: 110px; line-height: 1.55; }

/* Info strip */
.info-strip {
  background: rgba(201,162,74,0.10);
  border: 1px solid rgba(201,162,74,0.30);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: var(--space-5);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.55;
}
.info-strip .info-icon { color: var(--brand-gold-deep); flex-shrink: 0; margin-top: 2px; }

/* Radio cards */
.radio-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-top: 2px;
}
.radio-card-grid.three { grid-template-columns: repeat(3, 1fr); }
.radio-card {
  border: 1.5px solid var(--rule);
  background: var(--paper);
  border-radius: 10px;
  padding: 14px 12px;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
  font-family: var(--font-body);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.3;
  min-height: 90px;
}
.radio-card:hover {
  border-color: var(--brand-gold);
  background: rgba(201,162,74,0.05);
}
.radio-card.selected {
  border-color: var(--brand-gold);
  background: rgba(201,162,74,0.10);
  color: var(--brand-gold-deep);
  font-weight: 600;
}

/* Check cards */
.check-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 2px;
}
.check-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border: 1.5px solid var(--rule);
  border-radius: 9px;
  background: var(--paper);
  font-family: var(--font-body);
  font-size: 13.5px;
  color: var(--ink);
  cursor: pointer;
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
  text-align: left;
}
.check-card:hover { border-color: var(--brand-gold); }
.check-card.selected {
  border-color: var(--brand-gold);
  background: rgba(201,162,74,0.08);
}
.check-card-box {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--rule);
  background: var(--paper);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--brand-navy);
  transition: all var(--dur) var(--ease);
}
.check-card.selected .check-card-box {
  background: var(--brand-gold);
  border-color: var(--brand-gold);
  color: var(--brand-navy);
}
.check-card.simple {
  display: flex;
  align-items: center;
  gap: 10px;
}
.check-card .check-native {
  width: 18px;
  height: 18px;
  accent-color: var(--brand-gold);
  cursor: pointer;
  flex-shrink: 0;
}

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--rule);
  border-radius: 12px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
  background: var(--cream);
}
.upload-zone:hover,
.upload-zone.dragover {
  border-color: var(--brand-gold);
  background: rgba(201,162,74,0.06);
}
.upload-zone-icon {
  color: var(--brand-gold-deep);
  margin-bottom: 10px;
  display: flex;
  justify-content: center;
}
.upload-zone h4 {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 500;
  color: var(--brand-navy);
  margin: 0 0 6px;
}
.upload-zone p {
  font-size: 13.5px;
  color: var(--ink-2);
  margin: 4px 0;
}
.upload-zone-meta { font-size: 12px; color: var(--ink-3); }
.upload-browse {
  color: var(--brand-gold-deep);
  font-weight: 600;
  text-decoration: underline;
  text-decoration-color: var(--brand-gold);
  text-underline-offset: 3px;
}

.file-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.file-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(63,122,82,0.07);
  border: 1px solid rgba(63,122,82,0.22);
  border-radius: 8px;
  font-size: 13.5px;
}
.file-check { color: var(--success); display: inline-flex; }
.file-name { flex: 1; color: var(--ink); font-weight: 500; }
.file-size { color: var(--ink-3); font-size: 12px; }
.file-remove {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  border-radius: 4px;
}
.file-remove:hover { background: rgba(168,54,46,0.1); }

/* Document checklist */
.doc-checklist { margin-top: var(--space-7); }
.doc-checklist > h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  color: var(--brand-navy);
  margin: 0 0 var(--space-5);
}
.doc-category { margin-bottom: var(--space-5); }
.doc-category h4 {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--brand-navy);
  margin: 0 0 10px;
}
.doc-category h4 > span:nth-of-type(1) { flex: 1; }
.doc-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge-required { background: rgba(168,54,46,0.1); color: var(--danger); }
.badge-optional { background: rgba(122,130,148,0.12); color: var(--ink-2); }

/* Review */
.review-section { margin-bottom: var(--space-5); }
.review-section h4 {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  color: var(--brand-navy);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin: 0 0 10px;
}
.review-edit-btn {
  margin-left: auto;
  font-size: 12px;
  color: var(--brand-gold-deep);
  font-weight: 600;
  text-transform: none;
  letter-spacing: 0;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  text-decoration: underline;
  text-decoration-color: var(--brand-gold);
  text-underline-offset: 3px;
}
.review-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.review-table td {
  padding: 9px 0;
  border-bottom: 1px solid var(--rule-soft);
  vertical-align: top;
}
.review-table td:first-child { color: var(--ink-2); width: 44%; }
.review-table td:last-child { color: var(--ink); font-weight: 500; }

.consent-box {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: var(--cream-2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 16px 18px;
  margin-top: var(--space-4);
  cursor: pointer;
}
.consent-box input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--brand-gold);
  margin-top: 2px;
  flex-shrink: 0;
  cursor: pointer;
}
.consent-box span {
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--ink);
}
.consent-box a {
  color: var(--brand-gold-deep);
  text-decoration: underline;
  text-decoration-color: var(--brand-gold);
  text-underline-offset: 3px;
}

/* Form footer */
.intake-footer {
  padding: var(--space-5) var(--space-7);
  border-top: 1px solid var(--rule-soft);
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
}
.btn-back {
  background: transparent;
  border: 1.5px solid var(--rule);
  color: var(--ink-2);
  padding: 10px 22px;
  border-radius: 9px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--dur) var(--ease);
  font-family: var(--font-body);
}
.btn-back:hover { border-color: var(--brand-navy); color: var(--brand-navy); }
.save-note {
  font-size: 12.5px;
  color: var(--ink-3);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.intake-submit { background: var(--success); }
.intake-submit:hover { background: #2f6442; }

/* Success */
.success-card {
  text-align: center;
  padding: var(--space-8) var(--space-5);
}
.success-icon {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  background: rgba(63,122,82,0.12);
  color: var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--space-5);
}
.success-card h2 {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 500;
  color: var(--brand-navy);
  margin: 0 0 12px;
  letter-spacing: -0.01em;
}
.success-card p {
  color: var(--ink-2);
  font-size: 15px;
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto var(--space-5);
}
.ref-box {
  background: var(--cream-2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 14px 28px;
  display: inline-block;
  margin-bottom: var(--space-5);
}
.ref-label {
  font-size: 11.5px;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 600;
}
.ref-num {
  font-size: 24px;
  font-weight: 600;
  color: var(--brand-navy);
  font-family: var(--font-display);
  letter-spacing: 0.02em;
  margin-top: 4px;
}

@media (max-width: 720px) {
  .intake-body .form-row { grid-template-columns: 1fr; }
  .radio-card-grid.three { grid-template-columns: 1fr; }
  .check-grid { grid-template-columns: 1fr; }
  .intake-card-header { padding: var(--space-4) var(--space-5); }
  .intake-body { padding: var(--space-5) var(--space-5); }
  .intake-footer { padding: var(--space-4) var(--space-5); flex-wrap: wrap; }
  .intake-steps { gap: var(--space-4); }
  .intake-step-line { display: none; }
}
.site-footer {
  background: linear-gradient(180deg, var(--brand-navy) 0%, var(--brand-navy-2) 100%);
  color: rgba(255,255,255,.78);
  padding: var(--space-9) 0 var(--space-6);
}
.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: var(--space-7);
  margin-bottom: var(--space-8);
}
.footer-brand .brand-name { color: var(--brand-gold-soft); }
.footer-tagline {
  font-family: var(--font-display);
  font-style: italic;
  color: rgba(255,255,255,.75);
  margin-top: var(--space-4);
  font-size: 18px;
  line-height: 1.4;
  max-width: 32ch;
}
.footer-heading {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--brand-gold);
  margin: 0 0 var(--space-4);
}
.footer-link {
  display: block;
  font-size: 14px;
  color: rgba(255,255,255,.72);
  text-decoration: none;
  padding: 5px 0;
  transition: color var(--dur) var(--ease);
}
.footer-link:hover { color: var(--brand-gold-soft); }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,.12);
  padding-top: var(--space-5);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: rgba(255,255,255,.55);
}

/* ---- Consultation drawer (right-side panel) ---- */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(14,34,64,0.35);
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur) var(--ease);
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 480px;
  max-width: 92vw;
  background: var(--cream);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 360ms var(--ease);
  display: flex;
  flex-direction: column;
  box-shadow: -24px 0 60px rgba(14,34,64,.18);
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--rule-soft);
}
.drawer-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-2);
  padding: 6px;
  border-radius: 6px;
  display: flex;
}
.drawer-close:hover { background: var(--cream-2); color: var(--brand-navy); }
.drawer-body {
  padding: var(--space-6);
  flex: 1;
  overflow-y: auto;
}
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: var(--space-4); }
.field-label { font-size: 13px; font-weight: 600; color: var(--brand-navy); }
.field-input, .field-textarea, .field-select {
  font-family: var(--font-body);
  font-size: 15px;
  padding: 11px 14px;
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  width: 100%;
}
.field-input:focus, .field-textarea:focus, .field-select:focus {
  border-color: var(--brand-navy);
  box-shadow: 0 0 0 3px rgba(201,162,74,.25);
}
.field-textarea { resize: vertical; min-height: 100px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  font-size: 13px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--paper);
  border: 1px solid var(--rule);
  color: var(--ink);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.chip:hover { border-color: var(--brand-navy-soft); }
.chip.selected {
  background: var(--brand-navy);
  color: var(--paper);
  border-color: var(--brand-navy);
}
.drawer-footer {
  padding: var(--space-5) var(--space-6);
  border-top: 1px solid var(--rule-soft);
  display: flex;
  gap: 12px;
  align-items: center;
  background: var(--paper);
}

.success-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--space-8) var(--space-6);
  gap: var(--space-4);
}
.success-mark {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--brand-gold-soft);
  color: var(--brand-gold-deep);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---- Service detail panel ---- */
.service-panel-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(14,34,64,0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur) var(--ease);
}
.service-panel-overlay.open { opacity: 1; pointer-events: auto; }
.service-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 720px;
  max-width: 92vw;
  background: var(--cream);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 360ms var(--ease);
  display: flex;
  flex-direction: column;
  box-shadow: -24px 0 60px rgba(14,34,64,.18);
}
.service-panel.open { transform: translateX(0); }

.tag-pill {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 999px;
